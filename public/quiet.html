<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>QUIET — 零零精选</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0A0908;
  --bg-page:#14110D;
  --bg-sidebar:#0E0C0A;
  --bg-card:#1A1612;
  --bg-hero:#1C1813;
  --gold:#D4B670;
  --gold-bright:#E8C880;
  --gold-pale:#F5E1B0;
  --text-primary:#F5EFE3;
  --text-near:#F0E9DA;
  --text-secondary:#A89B82;
  --text-tertiary:#8E8470;
  --text-quaternary:#6B6356;
  --line:rgba(255,255,255,0.06);
  --line-strong:rgba(255,255,255,0.10);
  --serif:'Noto Serif SC','Songti SC','STSong',serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,'SF Mono','Menlo',monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg-deep);
  color:var(--text-primary);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:inherit;text-decoration:none}

.frame{
  background:var(--bg-page);
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
/* (engineering grid removed by user request) */
/* Light halos */
.halo{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
.halo--top{
  top:-180px;right:-120px;
  width:520px;height:520px;
  background:radial-gradient(circle,rgba(245,225,176,0.10),rgba(245,225,176,0) 60%);
}
.halo--bottom{
  bottom:-260px;left:-160px;
  width:560px;height:560px;
  background:radial-gradient(circle,rgba(212,182,112,0.06),rgba(212,182,112,0) 65%);
}

.layout{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:92px 1fr;
  max-width:1200px;
  margin:0 auto;
  min-height:100vh;
}
@media (max-width:879.98px){
  .layout{grid-template-columns:1fr}
}

/* Sidebar (desktop) */
.sidebar{
  background:var(--bg-sidebar);
  border-right:0.5px solid var(--line);
  position:sticky;top:0;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:36px 0 24px;
}
@media (max-width:879.98px){.sidebar{display:none}}
.brand{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
}
.brand .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-bright)}
.nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center}
.nav-item{
  width:48px;height:48px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-tertiary);
  position:relative;
  transition:color .2s ease;
}
.nav-item:hover{color:var(--text-near)}
.nav-item.active{color:var(--gold-bright)}
.nav-item.active::before{
  content:'';position:absolute;left:-10px;top:14px;bottom:14px;
  width:2px;background:var(--gold);border-radius:2px;
}
.nav-spacer{flex:1}
.nav-divider{
  width:32px;height:0;
  border-top:0.5px solid var(--line);
  margin:14px 0;
}
.user{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:10px;color:var(--text-quaternary);
  font-family:var(--sans);
  letter-spacing:0.04em;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;
  background:#161310;
  border:0.5px solid var(--line-strong);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);
  color:var(--text-near);
  font-size:14px;
  position:relative;
}
.user-avatar::after{
  content:'';position:absolute;right:-2px;bottom:-2px;
  width:8px;height:8px;border-radius:50%;
  background:#5dcaa5;
  border:1.5px solid var(--bg-sidebar);
}

/* Main */
.main{
  padding:40px 48px 80px;
  position:relative;
}
@media (max-width:879.98px){.main{padding:72px 18px 32px}}
@media (max-width:419.98px){.main{padding:64px 14px 28px}}

/* Mobile top bar */
.topbar{display:none}
.topbar-brand{
  display:flex;align-items:center;gap:8px;
  font-family:var(--serif);
  font-size:15px;color:var(--text-near);
  letter-spacing:0.06em;
}
.topbar-brand .ring{
  width:22px;height:22px;border-radius:50%;
  border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
}
.topbar-brand .ring .dot{width:4px;height:4px;border-radius:50%;background:var(--gold-bright)}
.topbar-avatar{
  width:30px;height:30px;border-radius:50%;
  background:#161310;
  border:0.5px solid var(--line-strong);
  font-family:var(--serif);font-size:12px;color:var(--text-near);
  display:flex;align-items:center;justify-content:center;
}

/* Header zone */
.header{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:end;
  gap:20px;
  margin-bottom:14px;
}
.eyebrow{
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.32em;
  color:var(--text-quaternary);
  text-transform:uppercase;
  margin:0 0 12px;
}
.h1{
  font-family:var(--serif);
  font-weight:400;
  font-size:40px;
  line-height:1.18;
  margin:0;
  color:var(--text-primary);
}
@media (max-width:879.98px){.h1{font-size:32px}}
@media (max-width:419.98px){.h1{font-size:26px}}
.filter-stat{
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-tertiary);
  text-align:right;
  letter-spacing:0.08em;
  white-space:nowrap;
}
.filter-stat b{color:var(--gold-bright);font-weight:500}

.divider-gold{
  height:0;
  border-top:0.5px solid var(--line);
  margin:18px 0 28px;
}
.divider-dashed{
  height:0;
  border-top:0.5px solid var(--line);
  margin:36px 0 28px;
}

/* Hero card */
.hero{
  position:relative;
  background:var(--bg-hero);
  border-radius:16px;
  padding:30px 32px 28px;
  margin-bottom:28px;
  border:1px solid transparent;
  background-clip:padding-box;
}
.hero::before{
  content:'';position:absolute;inset:-1px;
  border-radius:17px;
  padding:1px;
  background:linear-gradient(135deg,rgba(212,182,112,0.42),rgba(212,182,112,0.06) 40%,rgba(212,182,112,0.30) 100%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;left:0;right:0;top:0;height:60px;
  background:linear-gradient(to bottom,rgba(245,225,176,0.07),rgba(245,225,176,0));
  border-radius:16px 16px 0 0;
  pointer-events:none;
}
@media (max-width:419.98px){.hero{padding:24px 22px}}

.tag-row{
  display:flex;align-items:center;gap:14px;
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.18em;
  margin-bottom:18px;
  text-transform:uppercase;
}
.tag{color:var(--gold-bright);font-weight:500}
.tag-meta{color:var(--text-tertiary)}

.hero-title{
  font-family:var(--serif);
  font-weight:400;
  font-size:24px;
  line-height:1.4;
  margin:0 0 16px;
  color:var(--text-primary);
}
@media (max-width:419.98px){.hero-title{font-size:20px}}

.hero-lede{
  font-family:var(--serif);
  font-weight:400;
  font-size:15px;
  line-height:1.85;
  color:var(--text-near);
  margin:0 0 22px;
}
@media (max-width:419.98px){.hero-lede{font-size:14px}}

.hero-actions{
  display:flex;flex-wrap:wrap;gap:10px;
  font-family:var(--sans);
  font-size:11px;
  letter-spacing:0.06em;
}
.btn{
  display:inline-flex;align-items:center;
  padding:8px 14px;border-radius:8px;
  border:0.5px solid rgba(212,182,112,0.55);
  color:var(--gold-bright);
  background:transparent;
  transition:background .2s ease,color .2s ease,border-color .2s ease;
}
.btn:hover{background:rgba(212,182,112,0.06);color:var(--gold-pale)}
.btn--ghost{
  border-color:rgba(168,155,130,0.4);
  color:var(--text-tertiary);
}
.btn--ghost:hover{color:var(--text-primary);border-color:rgba(212,182,112,0.4)}

/* Secondary cards */
.secondary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}
@media (max-width:619.98px){.secondary{grid-template-columns:1fr}}
.card{
  background:var(--bg-card);
  border-radius:14px;
  border:0.5px solid var(--line);
  padding:22px 22px 20px;
  transition:transform .25s ease,border-color .25s ease;
}
.card:hover{transform:translateY(-1px);border-color:var(--line-strong)}
.card .tag-row{margin-bottom:12px}
.card .tag-meta--time{margin-left:auto}
.card-title{
  font-family:var(--serif);
  font-weight:400;
  font-size:16px;
  line-height:1.5;
  margin:0 0 8px;
  color:var(--text-primary);
}
.card-desc{
  font-family:var(--serif);
  font-size:13px;
  line-height:1.6;
  margin:0;
  color:var(--text-tertiary);
}

/* Links list */
.more-head{
  display:flex;align-items:baseline;gap:10px;
  margin:36px 0 16px;
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.32em;
  color:var(--text-quaternary);
  text-transform:uppercase;
}
.more-head .label{color:var(--text-tertiary)}
.links{display:flex;flex-direction:column;gap:10px}
.link{
  display:grid;
  grid-template-columns:54px 100px 1fr auto;
  align-items:center;
  gap:18px;
  padding:16px 18px;
  border:0.5px solid var(--line);
  border-radius:12px;
  background:var(--bg-card);
  transition:background .2s ease,border-color .2s ease,transform .25s ease;
}
.link:hover{background:rgba(255,255,255,0.025);border-color:var(--line-strong);transform:translateY(-1px)}
.link-no{
  font-family:var(--mono);
  font-size:13px;
  color:var(--text-quaternary);
  letter-spacing:0.08em;
}
.link-tag{
  font-family:var(--sans);
  font-size:13px;
  font-weight:500;
  color:var(--gold-bright);
  letter-spacing:0.14em;
}
.link-title{
  font-family:var(--serif);
  font-size:17px;
  font-weight:500;
  line-height:1.5;
  color:var(--text-primary);
}
.link-meta{
  font-family:var(--sans);
  font-size:11px;
  color:var(--text-tertiary);
  letter-spacing:0.10em;
  white-space:nowrap;
  text-align:right;
}
@media (max-width:619.98px){
  .link{grid-template-columns:1fr;gap:8px;padding:14px 16px}
  .link-no{display:none}
  .link-tag{order:1;font-size:12px}
  .link-title{order:2;font-size:16px}
  .link-meta{order:3;text-align:left;font-size:10px}
}

.farewell{
  text-align:center;
  font-family:var(--serif);
  font-size:13px;
  letter-spacing:0.18em;
  color:var(--text-quaternary);
  padding:40px 0 12px;
}
.farewell-mono{
  text-align:center;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.32em;
  color:var(--text-quaternary);
  text-transform:uppercase;
}

/* Pagination */
.pager{
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:24px 0 12px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.14em;
  color:var(--text-tertiary);
}
.pager-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:8px;
  border:0.5px solid var(--line-strong);
  color:var(--text-near);
  transition:background .2s ease,color .2s ease,border-color .2s ease;
}
.pager-btn:hover:not(:disabled){background:rgba(255,255,255,0.03);border-color:rgba(212,182,112,0.4);color:var(--gold-bright)}
.pager-btn:disabled{opacity:0.35;cursor:not-allowed}
.pager-state{font-family:var(--mono);color:var(--text-secondary)}
.pager-state b{color:var(--gold-bright);font-weight:500}

/* Watchlist hit marker */
.star{
  display:inline-block;
  color:var(--gold-bright);
  font-size:0.85em;
  margin-right:10px;
  letter-spacing:0;
  vertical-align:1px;
}
.hit-tickers{
  font-family:var(--mono);
  font-size:9px;
  color:var(--gold);
  letter-spacing:0.10em;
  margin-left:8px;
  text-transform:uppercase;
}

/* Bookmark / star toggle on cards */
.bookmark{
  position:absolute;
  top:12px;right:12px;
  width:26px;height:26px;
  border:0.5px solid var(--line);
  border-radius:6px;
  display:inline-flex;align-items:center;justify-content:center;
  color:var(--text-quaternary);
  background:rgba(20,17,13,0.6);
  cursor:pointer;
  z-index:3;
  transition:color .2s ease,border-color .2s ease,background .2s ease;
  font-size:13px;line-height:1;
}
.bookmark:hover{color:var(--gold-bright);border-color:var(--line-strong);background:rgba(20,17,13,0.85)}
.bookmark.saved{color:var(--gold-bright);border-color:rgba(212,182,112,0.4)}
.hero, .card{position:relative;cursor:pointer}
.card .tag-row{padding-right:36px}
.hero .tag-row{padding-right:36px}

/* Topic chip strip */
.topic-strip{
  display:none;
  flex-wrap:wrap;gap:8px;
  margin:0 0 18px;
}
.topic-strip.show{display:flex}
.topic-chip{
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--text-tertiary);
  padding:6px 14px;
  border-radius:999px;
  border:0.5px solid var(--line-strong);
  cursor:pointer;
  transition:color .2s ease,border-color .2s ease,background .2s ease;
}
.topic-chip:hover{color:var(--text-near)}
.topic-chip.active{color:var(--gold-bright);border-color:rgba(212,182,112,0.4);background:rgba(212,182,112,0.04)}
.topic-chip-count{margin-left:6px;color:var(--text-quaternary);font-family:var(--mono);font-size:9px}

/* Browse grid (non-home views) */
.browse-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media (max-width:619.98px){.browse-grid{grid-template-columns:1fr}}

/* Insight one-liner */
.insight{
  display:flex;align-items:flex-start;gap:10px;
  font-family:var(--serif);
  font-size:14px;
  line-height:1.6;
  color:var(--gold-pale);
  background:rgba(212,182,112,0.05);
  border-left:1.5px solid rgba(212,182,112,0.4);
  padding:10px 14px;
  border-radius:0 8px 8px 0;
  margin:14px 0 16px;
}
.insight::before{
  content:"提炼";
  flex-shrink:0;
  font-family:var(--sans);
  font-size:9px;
  letter-spacing:0.18em;
  color:var(--gold);
  padding-top:3px;
}
.card .insight{
  font-size:13px;
  margin:10px 0 10px;
  padding:8px 12px;
}

/* Empty state */
.empty{
  text-align:center;
  padding:60px 20px;
  font-family:var(--serif);
  color:var(--text-tertiary);
  font-size:14px;
  line-height:1.8;
}
.empty .small{
  display:block;margin-top:10px;
  font-family:var(--sans);
  font-size:11px;
  color:var(--text-quaternary);
  letter-spacing:0.10em;
}

/* Mobile tab bar */
.tabbar{
  display:none;
  position:fixed;left:0;right:0;top:0;
  background:rgba(14,12,10,0.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:0.5px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 8px) 0 8px;
  z-index:10;
}
@media (max-width:879.98px){.tabbar{display:flex}}
.tabbar > .tab{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:8px 0;
  color:var(--text-quaternary);
  transition:color .2s ease;
}
.tabbar > .tab > span{display:none}
.tab.active{color:var(--gold-bright)}
.tab:active{transform:scale(0.96)}

/* SVG sizing */
.icon{width:18px;height:18px;stroke-width:1.4;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.tab .icon{width:20px;height:20px;stroke-width:1.5}

@media (max-width:419.98px){
  .h1{font-size:24px}
  .hero{padding:22px 18px}
  .hero-title{font-size:19px}
  .hero-lede{font-size:13px;line-height:1.78}
  .card{padding:18px}
}
</style>
</head>
<body>
<div class="frame">
  <div class="halo halo--top"></div>
  <div class="halo halo--bottom"></div>

  <header class="topbar">
    <div class="topbar-brand">
      <span class="ring"><span class="dot"></span></span>
      QUIET
    </div>
    <div class="topbar-avatar">石</div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <a class="brand" href="/" title="返回学习台" aria-label="学习台"><span class="dot"></span></a>
      <nav class="nav" aria-label="主导航">
        <button class="nav-item active" data-view="all" title="新闻流" aria-label="新闻流">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <button class="nav-item" data-view="topics" title="话题 (按分类)" aria-label="话题">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16v16H4zM4 9h16M9 4v16"/></svg>
        </button>
        <button class="nav-item" data-view="starred" title="收藏" aria-label="收藏">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </button>
        <button class="nav-item" data-view="tracked" title="追踪 (持仓相关)" aria-label="追踪">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <a class="nav-item" href="/museum.html" title="文明博物馆" aria-label="博物馆">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 21h18M5 21V10l7-5 7 5v11M9 21V14h6v7M2 10h20"/></svg>
        </a>
        <a class="nav-item" href="/" title="返回学习台" aria-label="学习台">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
        </a>
        <div class="nav-spacer"></div>
        <button class="nav-item" title="设置" aria-label="设置">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01c.26.61.86 1 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="nav-divider"></div>
        <div class="user">
          <div class="user-avatar">石</div>
          <div>SHIGE</div>
          <div style="color:#5b5347">在线</div>
        </div>
      </nav>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <p class="eyebrow" id="eyebrow">— · — — —</p>
          <h1 class="h1" id="page-title">零零精选</h1>
        </div>
        <div class="filter-stat" id="filter-stat">已为你过滤 <b>—</b> 条</div>
      </div>

      <div class="divider-gold"></div>

      <div class="topic-strip" id="topic-strip"></div>

      <div id="content"></div>

      <nav class="pager" id="pager"></nav>

      <div class="divider-dashed"></div>
      <p class="farewell">零零精选已读完 · 明早 7 点再见</p>
      <p class="farewell-mono">QUIET — END OF DAY</p>
    </main>
  </div>

  <nav class="tabbar" aria-label="底部导航">
    <button class="tab active" data-view="all">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span>新闻</span>
    </button>
    <button class="tab" data-view="topics">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16v16H4zM4 9h16M9 4v16"/></svg>
      <span>话题</span>
    </button>
    <button class="tab" data-view="starred">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      <span>收藏</span>
    </button>
    <button class="tab" data-view="tracked">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
      <span>追踪</span>
    </button>
    <a class="tab" href="/museum.html" style="text-decoration:none">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 21h18M5 21V10l7-5 7 5v11M9 21V14h6v7M2 10h20"/></svg>
      <span>博物馆</span>
    </a>
    <a class="tab" href="/" style="text-decoration:none">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
      <span>学习台</span>
    </a>
  </nav>
</div>
<script>
const CAT_TAG = {
  ai:"AI", macro:"宏观", market:"市场", finance:"金融", tech:"科技",
  geopolitics:"地缘", space:"航天", energy:"能源", "bio-ai":"生物AI",
  trending:"热点", deep:"深读"
};

function relativeTime(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const diffMs = Date.now() - d.getTime();
  const m = Math.max(0, Math.round(diffMs / 60000));
  if (m < 60) return m + "m";
  const h = Math.round(m / 60);
  if (h < 24) return h + "h";
  return Math.floor(h / 24) + "d";
}

function pickSource(entry) {
  const tags = entry.tags || [];
  const skip = new Set(["精读","信号","命中持仓","GitHub","Trending","范式哨"]);
  const found = tags.find(t => t && !skip.has(t) && !/^[A-Z]{2,6}$/.test(t));
  return found || entry.source || "feed";
}

function mapItem(f) {
  const cat = (f.category || "NEWS").toLowerCase();
  const tags = f.tags || [];
  const hit = tags.includes("命中持仓");
  const hitTickers = tags.filter(t => /^[A-Z]{2,6}$/.test(t));
  // Parse insight prefix from content: "💡 xxx\n\n..."
  let insight = "";
  let lede = f.content || f.summary || "";
  const m = /^💡\s*([^\n]+)\n\n([\s\S]*)$/.exec(lede);
  if (m) { insight = m[1].trim(); lede = m[2].trim(); }
  else if (f.summary && f.summary.length <= 30) insight = f.summary;
  return {
    id: f.id || (f.title || "").slice(0,40),
    tag: CAT_TAG[cat] || cat.toUpperCase(),
    rawCategory: cat,
    source: pickSource(f),
    time: relativeTime(f.created_at || f.createdAt),
    title: f.title || "",
    insight,
    lede,
    desc: f.summary || "",
    url: f.url || "#",
    hit,
    hitTickers
  };
}

const STARRED = new Set(JSON.parse(localStorage.getItem("quiet:starred") || "[]"));
const READ = new Set(JSON.parse(localStorage.getItem("quiet:read") || "[]"));
function persistStarred(){ localStorage.setItem("quiet:starred", JSON.stringify([...STARRED])); }
function persistRead(){ localStorage.setItem("quiet:read", JSON.stringify([...READ].slice(-500))); }

let VIEW = "all";
let TOPIC = "";

function viewLabel(v){
  return {all:"零零精选",starred:"我的收藏",tracked:"持仓追踪",topics:"按话题",history:"历史已读"}[v] || "零零精选";
}

function setEyebrow(){
  const el = document.getElementById("eyebrow");
  if (!el) return;
  const d = new Date();
  const weekday = ["日","一","二","三","四","五","六"][d.getDay()];
  const fmt = `${d.getMonth()+1}月${d.getDate()}日 · 周${weekday}`;
  el.textContent = fmt;
}

function setTitle(){
  document.getElementById("page-title").textContent = viewLabel(VIEW) + (TOPIC?` · ${TOPIC}`:"");
}

function setStat(visible, total){
  const el = document.getElementById("filter-stat");
  if (!el) return;
  if (VIEW === "all") el.innerHTML = `今日抓取 <b>${total}</b> 条 · 显示 <b>${visible}</b>`;
  else if (VIEW === "starred") el.innerHTML = `已收藏 <b>${visible}</b> 条`;
  else if (VIEW === "tracked") el.innerHTML = `持仓相关 <b>${visible}</b> / 总 <b>${total}</b>`;
  else if (VIEW === "history") el.innerHTML = `已读 <b>${visible}</b> 条`;
  else if (VIEW === "topics") el.innerHTML = `${TOPIC?TOPIC+" · ":""}<b>${visible}</b> / <b>${total}</b>`;
}

function filteredItems(){
  if (VIEW === "starred") return ITEMS.filter(it => STARRED.has(it.id));
  if (VIEW === "tracked") return ITEMS.filter(it => it.hit);
  if (VIEW === "history") return ITEMS.filter(it => READ.has(it.id));
  if (VIEW === "topics" && TOPIC) return ITEMS.filter(it => it.rawCategory === TOPIC);
  return ITEMS;
}

function renderTopicStrip(){
  const strip = document.getElementById("topic-strip");
  if (VIEW !== "topics") { strip.classList.remove("show"); strip.innerHTML = ""; return; }
  const counts = {};
  ITEMS.forEach(it => { counts[it.rawCategory] = (counts[it.rawCategory]||0)+1; });
  const cats = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const chips = [`<button class="topic-chip${TOPIC===""?" active":""}" data-topic="">全部 <span class="topic-chip-count">${ITEMS.length}</span></button>`]
    .concat(cats.map(([c,n]) =>
      `<button class="topic-chip${TOPIC===c?" active":""}" data-topic="${escapeHtml(c)}">${escapeHtml(CAT_TAG[c]||c)} <span class="topic-chip-count">${n}</span></button>`));
  strip.innerHTML = chips.join("");
  strip.classList.add("show");
  strip.querySelectorAll(".topic-chip").forEach(btn => {
    btn.onclick = () => { TOPIC = btn.dataset.topic; renderTopicStrip(); applyView(); };
  });
}

function setActiveNav(){
  document.querySelectorAll(".nav-item, .tabbar .tab").forEach(b => {
    if (b.dataset && b.dataset.view) b.classList.toggle("active", b.dataset.view === VIEW);
  });
}

function applyView(){
  setActiveNav();
  setTitle();
  renderTopicStrip();
  const list = filteredItems();
  totalPages = Math.max(1, Math.ceil(list.length / PER_PAGE));
  page = 1;
  renderPageList(list);
  setStat(list.length, ITEMS.length);
}

function renderPageList(list){
  page = Math.min(Math.max(1,page), Math.max(1, Math.ceil(list.length / PER_PAGE)));
  const start = (page-1) * PER_PAGE;
  const slice = list.slice(start, start + PER_PAGE);
  const cnt = document.getElementById("content");
  if (slice.length === 0) {
    cnt.innerHTML = `<div class="empty">${VIEW==="starred"?"还没有收藏 — 点卡片右上角 ☆ 收藏":VIEW==="tracked"?"今日没有持仓相关新闻":VIEW==="history"?"还没有已读记录":"今日还没有精选 — 等下次抓取"}<span class="small">QUIET — EMPTY</span></div>`;
    document.getElementById("pager").innerHTML = "";
    return;
  }
  let html = "";
  if (VIEW === "all") {
    const hero = slice[0];
    const secondary = slice.slice(1, 3);
    const links = slice.slice(3);
    html = renderHero(hero);
    if (secondary.length) {
      html += `<section class="secondary">${secondary.map(renderCard).join("")}</section>`;
    }
    if (links.length) {
      html += `<p class="more-head">MORE LINKS · <span class="label">更多</span></p>`;
      html += `<div class="links">${links.map((it,i)=>renderLink(it, start + 4 + i)).join("")}</div>`;
    }
  } else {
    html = `<section class="browse-grid">${slice.map(renderCard).join("")}</section>`;
  }
  cnt.innerHTML = html;
  attachCardHandlers();
  attachLinkHandlers();

  const pages = Math.max(1, Math.ceil(list.length / PER_PAGE));
  const pagerHtml = pages > 1 ? `
    <button class="pager-btn" id="prev" ${page===1?"disabled":""}>← 上一页</button>
    <span class="pager-state"><b>${page}</b> / ${pages}</span>
    <button class="pager-btn" id="next" ${page===pages?"disabled":""}>下一页 →</button>` : "";
  document.getElementById("pager").innerHTML = pagerHtml;
  if (pages > 1) {
    const prev = document.getElementById("prev");
    const next = document.getElementById("next");
    if (prev) prev.onclick = () => { page--; renderPageList(list); window.scrollTo({top:0,behavior:"smooth"}); };
    if (next) next.onclick = () => { page++; renderPageList(list); window.scrollTo({top:0,behavior:"smooth"}); };
  }
}

function attachCardHandlers(){
  document.querySelectorAll(".bookmark").forEach(btn => {
    btn.onclick = (e) => {
      e.preventDefault(); e.stopPropagation();
      const id = btn.dataset.id;
      if (STARRED.has(id)) { STARRED.delete(id); btn.classList.remove("saved"); btn.textContent = "☆"; }
      else { STARRED.add(id); btn.classList.add("saved"); btn.textContent = "★"; }
      persistStarred();
      if (VIEW === "starred") applyView();
    };
  });
  // make hero + secondary cards clickable to open url
  document.querySelectorAll(".hero[data-id], .card[data-id]").forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest(".bookmark") || e.target.closest("a")) return;
      const id = el.dataset.id;
      const it = ITEMS.find(x => x.id === id);
      if (!it || !it.url || it.url === "#") return;
      READ.add(id); persistRead();
      window.open(it.url, "_blank", "noopener");
    };
  });
}
function attachLinkHandlers(){
  document.querySelectorAll(".link[data-id]").forEach(a => {
    a.addEventListener("click", () => {
      READ.add(a.dataset.id); persistRead();
    });
  });
  document.querySelectorAll(".hero .btn, .card[data-id]").forEach(el => {
    const id = el.closest("[data-id]")?.dataset.id;
    if (!id) return;
    el.addEventListener("click", () => { READ.add(id); persistRead(); });
  });
}

let ITEMS = [];
const PER_PAGE = 20;
let page = 1;
let totalPages = 1;

async function loadFeed() {
  try {
    const res = await fetch("/api/feed?limit=100");
    const data = await res.json();
    const isBundle = (t) => /^今日精读|^GitHub Trending 范式|今日信号$/.test(t || "");
    ITEMS = (Array.isArray(data) ? data : [])
      .filter(f => !isBundle(f.title))
      .map(mapItem);
    totalPages = Math.max(1, Math.ceil(ITEMS.length / PER_PAGE));
  } catch (e) {
    document.getElementById("content").innerHTML =
      '<p style="color:var(--text-tertiary);padding:40px 0;text-align:center;font-family:var(--serif)">加载新闻失败 — 检查 /api/feed 是否可用</p>';
    document.getElementById("pager").innerHTML = "";
    return false;
  }
  if (ITEMS.length === 0) {
    document.getElementById("content").innerHTML =
      '<p style="color:var(--text-tertiary);padding:40px 0;text-align:center;font-family:var(--serif)">今日还没有精选 — 等下次抓取</p>';
    document.getElementById("pager").innerHTML = "";
    return false;
  }
  return true;
}

function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}

function hitTickersHtml(item){
  return item.hitTickers && item.hitTickers.length
    ? `<span class="hit-tickers">${item.hitTickers.map(escapeHtml).join(" ")}</span>` : "";
}
function starHtml(item){
  return item.hit ? '<span class="star" title="命中持仓">★</span>' : "";
}
function bookmarkHtml(item){
  const saved = STARRED.has(item.id);
  return `<button class="bookmark${saved?" saved":""}" data-id="${escapeHtml(item.id)}" aria-label="收藏">${saved?"★":"☆"}</button>`;
}

function insightHtml(item){
  return item.insight ? `<p class="insight">${escapeHtml(item.insight)}</p>` : "";
}

function renderHero(item){
  const url = item.url || "#";
  return `<article class="hero" data-id="${escapeHtml(item.id)}">
    ${bookmarkHtml(item)}
    <div class="tag-row">
      <span class="tag">${escapeHtml(item.tag)}</span>
      <span class="tag-meta">${escapeHtml(item.source)}</span>
      ${item.time?`<span class="tag-meta tag-meta--time">${escapeHtml(item.time)}</span>`:""}
      ${hitTickersHtml(item)}
    </div>
    <h2 class="hero-title">${starHtml(item)}${escapeHtml(item.title)}</h2>
    ${insightHtml(item)}
    <p class="hero-lede">${escapeHtml(item.lede || item.desc || "")}</p>
    <div class="hero-actions">
      <a class="btn" href="${escapeHtml(url)}" target="_blank" rel="noopener">阅读原文</a>
      <a class="btn btn--ghost" href="${escapeHtml(url)}" target="_blank" rel="noopener">查看来源</a>
    </div>
  </article>`;
}

function renderCard(item){
  return `<article class="card" data-id="${escapeHtml(item.id)}">
    ${bookmarkHtml(item)}
    <div class="tag-row">
      <span class="tag">${escapeHtml(item.tag)}</span>
      <span class="tag-meta">${escapeHtml(item.source||"")}</span>
      ${item.time?`<span class="tag-meta tag-meta--time">${escapeHtml(item.time)}</span>`:""}
      ${hitTickersHtml(item)}
    </div>
    <h3 class="card-title">${starHtml(item)}${escapeHtml(item.title)}</h3>
    ${insightHtml(item)}
    ${!item.insight && item.desc?`<p class="card-desc">${escapeHtml(item.desc)}</p>`:""}
  </article>`;
}

function renderLink(item, no){
  const url = item.url || "#";
  const padded = String(no).padStart(2,"0");
  return `<a class="link" href="${escapeHtml(url)}" target="_blank" rel="noopener" data-id="${escapeHtml(item.id)}">
    <span class="link-no">${padded}</span>
    <span class="link-tag">${escapeHtml(item.tag)}</span>
    <span class="link-title">${starHtml(item)}${escapeHtml(item.title)}${hitTickersHtml(item)}</span>
    <span class="link-meta">${escapeHtml(item.source||"")} ${item.time?"· "+escapeHtml(item.time):""}</span>
  </a>`;
}

function bindNav(){
  document.querySelectorAll(".nav-item, .tabbar .tab").forEach(b => {
    if (!b.dataset || !b.dataset.view) return;
    b.onclick = () => {
      VIEW = b.dataset.view;
      if (VIEW !== "topics") TOPIC = "";
      applyView();
      window.scrollTo({top:0,behavior:"smooth"});
    };
  });
}

setInterval(setEyebrow, 60_000);
(async () => {
  setEyebrow();
  bindNav();
  if (await loadFeed()) applyView();
})();
</script>
</body>
</html>
