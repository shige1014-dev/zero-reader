<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>文明博物馆 · MUSEUM 2076</title>
<style>
:root{
  --bg:#09090B;
  --card:#141416;
  --card-elev:#1C1C1E;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.10);
  --gold:#C9A84C;
  --gold-soft:rgba(201,168,76,0.08);
  --gold-line:rgba(201,168,76,0.24);
  --t1:#F5F5F7;
  --t2:#EBEBF0;
  --t3:#8E8E93;
  --t4:#48484A;
  --rank-ssplus:#C9A84C;
  --rank-ss:#B9BDC8;
  --rank-s:#B67A3C;
  --rank-bet:#BF4A7A;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--t1);font-family:Inter,"Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{min-height:100vh;background:
  radial-gradient(circle at top right, rgba(201,168,76,0.12), transparent 22%),
  radial-gradient(circle at bottom left, rgba(191,74,122,0.08), transparent 18%),
  var(--bg)}
a{color:inherit;text-decoration:none}
button{font:inherit}
#museumRoot{min-height:100vh}
</style>
</head>
<body>
<main id="museumRoot"></main>
<script src="/museum.js" type="module"></script>
</body>
</html>
