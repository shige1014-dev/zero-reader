<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>文明博物馆 · MUSEUM 2076</title>
<style>
:root{
  --bg:#09090B;
  --card:#141416;
  --card-elev:#1C1C1E;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.10);
  --gold:#C9A84C;
  --gold-soft:rgba(201,168,76,0.08);
  --gold-line:rgba(201,168,76,0.24);
  --t1:#F5F5F7;
  --t2:#EBEBF0;
  --t3:#8E8E93;
  --t4:#48484A;
  --rank-ssplus:#C9A84C;
  --rank-ss:#B9BDC8;
  --rank-s:#B67A3C;
  --rank-bet:#BF4A7A;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--t1);font-family:Inter,"Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{min-height:100vh;background:
  radial-gradient(circle at top right, rgba(201,168,76,0.12), transparent 22%),
  radial-gradient(circle at bottom left, rgba(191,74,122,0.08), transparent 18%),
  var(--bg)}
a{color:inherit;text-decoration:none}
button{font:inherit}
#museumRoot{min-height:100vh;padding-top:58px}

/* unified top nav */
.zh-topbar{
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:rgba(9,9,11,0.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:0.5px solid var(--border);
  padding:calc(env(safe-area-inset-top) + 8px) 0 8px;
}
.zh-topbar .zh-tab{
  flex:0 0 auto; width:54px; height:42px;
  display:flex; align-items:center; justify-content:center;
  color:var(--t3); border-radius:8px; margin:0 4px;
  transition:color .15s, background .15s;
}
.zh-topbar .zh-tab:hover{color:var(--t1); background:rgba(255,255,255,0.03)}
.zh-topbar .zh-tab.active{color:var(--gold); background:var(--gold-soft)}
@media (max-width:639.98px){
  .zh-topbar .zh-tab{width:48px; height:38px; margin:0 2px}
  #museumRoot{padding-top:54px}
}
</style>
</head>
<body>
<header class="zh-topbar" aria-label="主导航">
  <a class="zh-tab" href="/" title="学习台" aria-label="学习台">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
  </a>
  <a class="zh-tab" href="/quiet.html" title="精选" aria-label="精选">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </a>
  <a class="zh-tab active" href="/museum.html" title="博物馆" aria-label="博物馆">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V10l7-5 7 5v11M9 21V14h6v7M2 10h20"/></svg>
  </a>
  <a class="zh-tab" href="/matrix" title="三维股票" aria-label="三维股票">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4zM4 9h16M9 4v16"/></svg>
  </a>
  <a class="zh-tab" href="/prophecies" title="预言堂" aria-label="预言堂">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
  </a>
  <a class="zh-tab" href="/civilization-leap/01-ai-rewrites-os" title="文明跃迁" aria-label="文明跃迁">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h11l3 3v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zM8 8h8M8 12h8M8 16h5"/></svg>
  </a>
</header>
<main id="museumRoot"></main>
<script src="/museum.js" type="module"></script>
</body>
</html>
